<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900"
      rel="stylesheet"
    />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal de Notícias</title>
    <link rel="stylesheet" href="styles/index.css" />
  </head>

  <body>
    <header>
      <nav id="primary" class="grid grid-flow-col">
        <div class="menu">
          <img src="assets/icons/List.svg" alt="menu" />
          <strong>Menu</strong>
        </div>

        <div class="logo">
          <img src="assets/Logo.png" alt="logo" />
        </div>

        <div class="lupa">
          <strong>Buscar</strong>
          <img src="assets/icons/MagnifyingGlass.svg" alt="lupa" />
        </div>
      </nav>

      <nav id="secondary" class="grid grid-flow-col">
        <a href="#">Feira de Ciências</a>
        <a href="#">Robótica</a>
        <a href="#">Tecnologia</a>
        <a href="#">Educação</a>
        <a href="#">Projetos Sociais</a>
        <a href="#">Cultura</a>
        <a href="#">Inovação</a>
      </nav>
    </header>

    <main class="grid container">
      <section id="featured" class="grid grid-flow-col gap-16">
        <figure class="card">
          <img src="assets/images/Image 01.jpg" alt="" />
          <figcaption>
            <span class="tag-content">Feira de Ciências</span>
            <h2 class="text-2xl">
              Feira de Ciências da ETEC Albert Einstein surpreende com projetos
              sustentáveis desenvolvidos por alunos.
            </h2>
          </figcaption>
        </figure>

        <div class="grid grid-cols-2 gap-16">
          <figure class="card-2">
            <img src="assets/images/Image 02.png" alt="" />
            <figcaption>
              <span class="tag-content">Robótica</span>
              <h2 class="text-l">
                Alunos da ETEC conquistam prêmio estadual com robô autônomo
                inovador.
              </h2>
            </figcaption>
          </figure>

          <figure class="card-2">
            <img src="assets/images/Image 05.png" alt="" />
            <figcaption>
              <span class="tag-content">Tecnologia</span>
              <h2 class="text-l">
                Novo laboratório de informática é inaugurado com equipamentos
                modernos para os estudantes.
              </h2>
            </figcaption>
          </figure>

          <figure class="card-2">
            <img src="assets/images/Image 04.jpg" alt="" />
            <figcaption>
              <span class="tag-content">Projeto Social</span>
              <h2 class="text-l">
                Estudantes promovem ações comunitárias com oficinas gratuitas
                para moradores da região.
              </h2>
            </figcaption>
          </figure>

          <figure class="card-2">
            <img src="assets/images/Image 03.jpg" alt="" />
            <figcaption>
              <span class="tag-content">Cultura</span>
              <h2 class="text-l">
                Semana cultural da ETEC celebra diversidade com apresentações
                artísticas e gastronomia.
              </h2>
            </figcaption>
          </figure>
        </div>
      </section>

      <section id="weekly">
        <header class="grid grid-flow-col">
          <h3>Mais lidas da semana</h3>
          <a href="#" class="grid grid-flow-col">
            <strong>Ver tudo</strong>
            <span></span>
          </a>
        </header>

        <div class="grid gap-16">
          <figure>
            <span class="tag-content">Educação</span>
            <img src="assets/images/Image 06.jpg" alt="" />
            <p>
              Professores implementam novas metodologias digitais para melhorar
              o aprendizado em sala de aula.
            </p>
          </figure>

          <figure>
            <span class="tag-content">Eventos</span>
            <img src="assets/images/Image 07.png" alt="" />
            <p>
              ETEC organiza palestra com profissionais da área de tecnologia
              para orientar os alunos sobre mercado de trabalho, inovação e novas
              oportunidades na carreira.
            </p>
          </figure>

          <figure>
            <span class="tag-content">Inovação</span>
            <img src="assets/images/Image 08.png" alt="" />
            <p>
              Grupo de estudantes desenvolve aplicativo escolar para facilitar a
              comunicação interna entre alunos, professores e coordenação
              pedagógica.
            </p>
          </figure>

          <figure>
            <span class="tag-content">Comunidade</span>
            <img class="Image09" src="assets/images/Image 09.webp" alt="" />
            <p>
              Projeto educacional leva conhecimento técnico a jovens de
              comunidades próximas à escola, ampliando oportunidades de formação
              e inclusão social.
            </p>
          </figure>
        </div>
      </section>
    </main>
  </body>
</html>
